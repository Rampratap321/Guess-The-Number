<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Enter Your Guess</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <h2>Guess a Number Between 1 and 100</h2>

  <button onclick="checkGuess()">Submit</button>
  <p id="error" class="error"></p>
</body>
</html>
